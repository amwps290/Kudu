<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/kudu-mark.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kudu - 轻量级桌面数据库客户端</title>
    <!-- 内联启动样式：消除白屏，窗口出现即为深色背景（与 index.html 保持一致） -->
    <style>
      body {
        margin: 0;
        background-color: #1a1a2e;
        color: rgba(255, 255, 255, 0.85);
        font-family: Inter, "Segoe UI", system-ui, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
      }
      .splash {
        text-align: center;
        animation: splash-fade-in 0.3s ease-out;
      }
      .splash-logo {
        font-size: 32px;
        font-weight: 700;
        letter-spacing: 2px;
        color: #e8a87c;
        margin-bottom: 16px;
      }
      .splash-loader {
        width: 28px;
        height: 28px;
        border: 3px solid rgba(232, 168, 124, 0.2);
        border-top-color: #e8a87c;
        border-radius: 50%;
        animation: splash-spin 0.8s linear infinite;
        margin: 0 auto;
      }
      @keyframes splash-fade-in {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes splash-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <!-- Vue mount 替换前显示品牌加载指示器（Slice 12 起本文件为 Vue 对照入口） -->
      <div class="splash">
        <div class="splash-logo">Kudu</div>
        <div class="splash-loader"></div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
